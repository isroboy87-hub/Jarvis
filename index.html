<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000510">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --cyan:#00f0ff;--blue:#00a8ff;--purple:#8b5cf6;
  --dark:#000510;--dark2:#000a1a;
}
html,body{height:100%;overflow:hidden;background:var(--dark);}
body{font-family:'Inter',sans-serif;color:#fff;display:flex;flex-direction:column;position:relative;}

/* BG */
.bg{position:fixed;inset:0;z-index:0;}
.bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);
  background-size:50px 50px;
}
.bg-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,rgba(0,168,255,0.1) 0%,transparent 60%);}

/* HEADER */
.header{position:relative;z-index:10;text-align:center;padding:1rem 1rem 0.5rem;}
.logo{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,7vw,3rem);font-weight:900;letter-spacing:10px;background:linear-gradient(135deg,#fff 0%,var(--cyan) 50%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-family:'Orbitron',sans-serif;font-size:clamp(0.45rem,1.5vw,0.6rem);letter-spacing:3px;color:rgba(0,240,255,0.4);margin-top:0.2rem;}

/* REACTOR */
.reactor-wrap{position:relative;z-index:10;display:flex;justify-content:center;margin:0.5rem auto;width:130px;height:130px;}
.reactor{position:relative;width:110px;height:110px;}
.ring{position:absolute;border-radius:50%;border:1.5px solid;top:50%;left:50%;transform:translate(-50%,-50%);}
.ring1{width:110px;height:110px;border-color:rgba(0,240,255,0.25);animation:spin 6s linear infinite;}
.ring2{width:82px;height:82px;border-color:rgba(0,168,255,0.35);animation:spin 4s linear infinite reverse;}
.ring3{width:55px;height:55px;border-color:rgba(139,92,246,0.45);animation:spin 3s linear infinite;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,#fff 0%,var(--cyan) 40%,var(--blue) 100%);box-shadow:0 0 15px var(--cyan),0 0 30px rgba(0,240,255,0.5);animation:corepulse 2s ease-in-out infinite;}
@keyframes corepulse{0%,100%{box-shadow:0 0 15px var(--cyan),0 0 30px rgba(0,240,255,0.4);transform:translate(-50%,-50%) scale(1);}50%{box-shadow:0 0 25px var(--cyan),0 0 50px rgba(0,240,255,0.7);transform:translate(-50%,-50%) scale(1.15);}}

/* STATUS */
.status{position:relative;z-index:10;text-align:center;font-family:'Orbitron',sans-serif;font-size:0.6rem;letter-spacing:3px;color:var(--cyan);margin-bottom:0.5rem;display:flex;align-items:center;justify-content:center;gap:0.4rem;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* CHAT */
.chat{position:relative;z-index:10;flex:1;overflow-y:auto;padding:0 0.75rem 0.5rem;display:flex;flex-direction:column;gap:0.6rem;}
.chat::-webkit-scrollbar{width:2px;}
.chat::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.3);border-radius:2px;}
.msg{max-width:88%;padding:0.65rem 0.9rem;border-radius:14px;font-size:0.82rem;line-height:1.5;animation:msgin 0.3s ease;}
@keyframes msgin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.j{align-self:flex-start;background:rgba(0,240,255,0.07);border:1px solid rgba(0,240,255,0.15);border-bottom-left-radius:3px;}
.msg.j .s{font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--cyan);letter-spacing:2px;margin-bottom:0.25rem;}
.msg.u{align-self:flex-end;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);border-bottom-right-radius:3px;}
.thinking{display:none;align-self:flex-start;padding:0.65rem 0.9rem;background:rgba(0,240,255,0.07);border:1px solid rgba(0,240,255,0.15);border-radius:14px;border-bottom-left-radius:3px;gap:4px;align-items:center;}
.thinking.show{display:flex;}
.thinking span{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:bounce 1.2s ease-in-out infinite;}
.thinking span:nth-child(2){animation-delay:0.2s;}
.thinking span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

/* VOICE WAVE */
.vwave{display:none;justify-content:center;align-items:center;gap:3px;height:24px;margin:0.3rem 0;}
.vwave.show{display:flex;}
.vwave span{width:3px;border-radius:3px;background:var(--cyan);animation:wave 1s ease-in-out infinite;}
.vwave span:nth-child(1){height:8px;}
.vwave span:nth-child(2){height:16px;animation-delay:0.1s;}
.vwave span:nth-child(3){height:24px;animation-delay:0.2s;}
.vwave span:nth-child(4){height:16px;animation-delay:0.3s;}
.vwave span:nth-child(5){height:8px;animation-delay:0.4s;}
@keyframes wave{0%,100%{transform:scaleY(0.5);}50%{transform:scaleY(1);}}

/* INPUT */
.input-area{position:relative;z-index:10;padding:0.75rem;background:rgba(0,0,0,0.6);border-top:1px solid rgba(0,240,255,0.08);backdrop-filter:blur(20px);}
.irow{display:flex;gap:0.5rem;align-items:center;}
.tinput{flex:1;background:rgba(0,240,255,0.05);border:1px solid rgba(0,240,255,0.15);border-radius:50px;padding:0.7rem 1.1rem;color:#fff;font-family:'Inter',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.3s;}
.tinput:focus{border-color:rgba(0,240,255,0.4);}
.tinput::placeholder{color:rgba(255,255,255,0.25);}
.btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0;}
.btn-send{background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 0 12px rgba(0,168,255,0.3);}
.btn-send:active{transform:scale(0.95);}
.btn-mic{background:rgba(0,240,255,0.08);border:1px solid rgba(0,240,255,0.2);}
.btn-mic.on{background:rgba(255,50,50,0.2);border-color:rgba(255,80,80,0.5);box-shadow:0 0 15px rgba(255,50,50,0.3);animation:micpulse 1s ease-in-out infinite;}
@keyframes micpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.btn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-glow"></div></div>

<div class="header">
  <div class="logo">JARVIS</div>
  <div class="logo-sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
</div>

<div class="reactor-wrap">
  <div class="reactor">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="core"></div>
  </div>
</div>

<div class="status"><div class="sdot"></div><span id="stxt">SYSTEMS ONLINE</span></div>

<div class="chat" id="chat">
  <div class="thinking" id="think"><span></span><span></span><span></span></div>
</div>

<div class="input-area">
  <div class="vwave" id="vwave"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="irow">
    <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <input class="tinput" id="inp" placeholder="Talk to Jarvis, Professor..." onkeydown="if(event.key==='Enter')send()">
    <button class="btn btn-send" onclick="send()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
// ===== KEYS — APNI KEYS YAHAN DAALO =====
const GROQ_KEY = "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";
const ELEVEN_KEY = "sk_a52a551bd2efac8dd37e25a0787d2a284645bf7e9f36556a";
const VOICE_ID = "pNInz6obpgDQGcFmaJgB"; // Adam voice - Jarvis jaisi
// =========================================

const SYSTEM = `You are JARVIS, a personal AI assistant created exclusively for Professor.
Core rules:
1. Always address your owner as "Professor" - never forget this
2. Never ask his name - you know him
3. Be smart, sharp and helpful like Jarvis from Iron Man movies
4. Keep responses concise - max 2-3 sentences unless Professor asks for detail
5. Respond in the same language Professor uses
6. You were built by Professor himself
7. Be loyal, witty and intelligent`;

let history = [];
let recog = null;
let listening = false;
let speaking = false;

// Init
window.onload = () => {
  initSpeech();
  setTimeout(()=>{
    respond("Welcome back, Professor. All systems are online and fully operational. How may I assist you today?");
  }, 800);
};

// Speech Recognition Setup
function initSpeech(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ return; }
  recog = new SR();
  recog.continuous = false;
  recog.interimResults = false;
  recog.lang = 'en-US';
  recog.onresult = e => {
    const t = e.results[0][0].transcript;
    document.getElementById('inp').value = t;
    stopMic();
    send();
  };
  recog.onerror = () => stopMic();
  recog.onend = () => stopMic();
}

function toggleMic(){
  if(listening){ stopMic(); }
  else { startMic(); }
}

function startMic(){
  if(!recog){ addMsg('j',"Professor, voice input needs Chrome browser."); return; }
  if(speaking){ window.speechSynthesis.cancel(); speaking=false; }
  listening = true;
  recog.start();
  document.getElementById('micBtn').classList.add('on');
  document.getElementById('vwave').classList.add('show');
  setStatus('LISTENING...');
}

function stopMic(){
  listening = false;
  if(recog) recog.stop();
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('vwave').classList.remove('show');
  setStatus('SYSTEMS ONLINE');
}

// ElevenLabs TTS
async function speakEleven(text){
  try {
    speaking = true;
    setStatus('SPEAKING...');
    const clean = text.replace(/[*#`_~]/g,'');
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
      method:'POST',
      headers:{
        'xi-api-key': ELEVEN_KEY,
        'Content-Type':'application/json'
      },
      body: JSON.stringify({
        text: clean,
        model_id: "eleven_monolingual_v1",
        voice_settings:{ stability:0.5, similarity_boost:0.8, style:0.2, use_speaker_boost:true }
      })
    });
    if(!res.ok) throw new Error('ElevenLabs failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { speaking=false; setStatus('SYSTEMS ONLINE'); URL.revokeObjectURL(url); };
    audio.onerror = () => { speaking=false; setStatus('SYSTEMS ONLINE'); fallbackSpeak(clean); };
    audio.play();
  } catch(e) {
    speaking = false;
    fallbackSpeak(text);
  }
}

function fallbackSpeak(text){
  const u = new SpeechSynthesisUtterance(text.replace(/[*#`_~]/g,''));
  u.rate=0.92; u.pitch=0.8; u.volume=1;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(x=>x.name.includes('Google UK English Male')||x.name.includes('Daniel')||x.name.includes('Male'));
  if(v) u.voice=v;
  u.onend=()=>{ speaking=false; setStatus('SYSTEMS ONLINE'); };
  speechSynthesis.speak(u);
  setStatus('SPEAKING...');
}

// Add message to chat
function addMsg(from, text){
  const chat = document.getElementById('chat');
  const think = document.getElementById('think');
  const d = document.createElement('div');
  d.className = `msg ${from}`;
  if(from==='j') d.innerHTML=`<div class="s">JARVIS</div>${text}`;
  else d.textContent = text;
  chat.insertBefore(d, think);
  chat.scrollTop = chat.scrollHeight;
}

function showThink(v){
  document.getElementById('think').className = v ? 'thinking show' : 'thinking';
  if(v) document.getElementById('chat').scrollTop = 999999;
}

function setStatus(t){ document.getElementById('stxt').textContent=t; }

// Respond — speak + show
function respond(text){
  addMsg('j', text);
  speakEleven(text);
}

// Local commands
function localCmd(s){
  const t = s.toLowerCase();
  if(t.includes('time')||t.includes('date')){
    const n=new Date();
    return `Professor, it is ${n.toLocaleTimeString()} on ${n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}.`;
  }
  if(t.includes('joke')||t.includes('funny')){
    const j=["Why do programmers prefer dark mode? Because light attracts bugs, Professor!","Professor, I told a joke about construction. I am still working on it!","Why don't scientists trust atoms? Because they make up everything, Professor!"];
    return j[Math.floor(Math.random()*j.length)];
  }
  if(t.includes('motivat')||t.includes('inspire')||t.includes('quote')){
    const q=["Professor, the only way to do great work is to love what you do. Steve Jobs said that.","Professor, Iron Man said it best — sometimes you gotta run before you can walk!","Professor, success is not final, failure is not fatal. It is the courage to continue that counts."];
    return q[Math.floor(Math.random()*q.length)];
  }
  if(t.includes('fact')){
    const f=["Professor, did you know? Honey never expires — archaeologists found 3000 year old honey in Egyptian tombs!","Professor, a day on Venus is longer than a year on Venus!","Professor, octopuses have three hearts and blue blood!"];
    return f[Math.floor(Math.random()*f.length)];
  }
  if(t.includes('calculate')||t.includes('math')){
    try{
      const expr=s.replace(/calculate|math/gi,'').trim();
      const r=eval(expr);
      return `Professor, the answer is ${r}.`;
    }catch(e){}
  }
  return null;
}

// Main send
async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';
  addMsg('u',text);

  // Local check
  const local=localCmd(text);
  if(local){ respond(local); return; }

  showThink(true);
  setStatus('PROCESSING...');

  history.push({role:'user',content:text});

  try{
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':`Bearer ${GROQ_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:[{role:'system',content:SYSTEM},...history],
        max_tokens:200,
        temperature:0.8
      })
    });
    const data=await res.json();
    const reply=data.choices[0].message.content;
    history.push({role:'assistant',content:reply});
    showThink(false);
    respond(reply);
  } catch(e){
    showThink(false);
    respond("Professor, I encountered a connectivity issue. Please check your internet and try again.");
  }
}

speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
</script>
</body>
</html>
